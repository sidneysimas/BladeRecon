services:
  bladerecon:
    build: .
    image: bladerecon:0.2.1
    command: ["--help"]
    volumes:
      - ./results:/app/results
      - ./config.yaml:/app/config.yaml:ro

  doctor:
    build: .
    image: bladerecon:0.2.1
    command: ["doctor"]
    volumes:
      - ./results:/app/results
      - ./config.yaml:/app/config.yaml:ro

  recon:
    build: .
    image: bladerecon:0.2.1
    profiles: ["recon"]
    command: ["full", "example.com", "--no-all", "--profile", "safe"]
    volumes:
      - ./results:/app/results
      - ./config.yaml:/app/config.yaml:ro

  full:
    build: .
    image: bladerecon:0.2.1
    profiles: ["full"]
    command: ["full", "example.com", "--profile", "safe"]
    volumes:
      - ./results:/app/results
      - ./config.yaml:/app/config.yaml:ro

  advanced:
    build: .
    image: bladerecon:0.2.1
    profiles: ["advanced"]
    command: ["advanced", "example.com", "--profile", "safe"]
    volumes:
      - ./results:/app/results
      - ./config.yaml:/app/config.yaml:ro

  report:
    build: .
    image: bladerecon:0.2.1
    profiles: ["report"]
    command: ["report", "example.com"]
    volumes:
      - ./results:/app/results
      - ./config.yaml:/app/config.yaml:ro
